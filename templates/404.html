{% extends "base.html" %}

{% block title %}Page Not Found | Secure Login System{% endblock %}

{% block body %}

<!-- Navigation -->
<nav class="cyber-nav navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-shield-lock-fill text-primary fs-3"></i>
            <span class="glow-text fw-bold fs-5">SecureAuth</span>
        </a>
    </div>
</nav>

<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 80px;">
    <div class="text-center">
        <div class="mb-4">
            <span style="font-size: 10rem; font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--cyber-primary), var(--cyber-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">404</span>
        </div>
        <h1 class="h2 fw-bold mb-3">Page Not Found</h1>
        <p class="text-muted mb-4" style="max-width: 420px; margin: 0 auto;">
            The page you're looking for doesn't exist or has been moved. 
        </p>
        <a href="/" class="cyber-btn btn">
            <i class="bi bi-arrow-left me-2"></i>Go Home
        </a>
    </div>
</div>

{% endblock %}
